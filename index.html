<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر Simple Shop</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header class="store-header">
        <button class="icon-btn"><i class="fas fa-arrow-right"></i></button>
        <h1 class="logo">Simple Shop</h1>
        <button class="icon-btn"><i class="fas fa-shopping-basket"></i></button>
    </header>

    <div class="categories">
        <div class="category active">الكل</div>
        <div class="category">خضروات</div>
        <div class="category">فواكه</div>
        <div class="category">منظفات</div>
    </div>

    <main class="product-grid">
        <div class="product-card">
            <div class="product-image"><img src="item1.jpg" alt="منتج"></div>
            <div class="product-info">
                <h3>طماطم طازجة</h3>
                <p class="price">25 جنيه</p>
                <button class="add-btn"><i class="fas fa-plus"></i></button>
            </div>
        </div>
        <div class="product-card">
            <div class="product-image"><img src="item2.jpg" alt="منتج"></div>
            <div class="product-info">
                <h3>تفاح أحمر</h3>
                <p class="price">45 جنيه</p>
                <button class="add-btn"><i class="fas fa-plus"></i></button>
            </div>
        </div>
    </main>

</body>
</html>
